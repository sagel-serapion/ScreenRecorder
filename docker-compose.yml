version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: loom-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: screendb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "@ezio1985"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: loom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: loom-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  app:
    build: .
    container_name: loom-app
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/screendb
      SPRING_DATASOURCE_USERNAME: loom
      SPRING_DATASOURCE_PASSWORD: loom123
      SPRING_DATA_REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres-data:
  redis-data:
  minio-data: